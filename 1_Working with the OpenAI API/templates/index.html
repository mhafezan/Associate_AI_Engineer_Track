<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAI Flask Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 70%;
            max-width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .header {
            background: #1f2937;
            color: white;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .chat-box {
            padding: 20px;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
            background: #fafafa;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .user {
            background: #dbeafe;
            text-align: right;
        }

        .assistant {
            background: #e5e7eb;
            text-align: left;
        }

        .label {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .form-area {
            display: flex;
            gap: 10px;
            padding: 20px;
            border-top: 1px solid #ddd;
            background: #fff;
        }

        .form-area input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
        }

        .form-area button,
        .clear-form button {
            padding: 12px 18px;
            font-size: 16px;
            cursor: pointer;
        }

        .clear-form {
            padding: 0 20px 20px 20px;
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">OpenAI Flask Chatbot</div>

        <div class="chat-box">
            {% if messages %}
                {% for msg in messages %}
                    <div class="message {{ msg.role }}">
                        <div class="label">
                            {% if msg.role == "user" %}
                                User
                            {% elif msg.role == "assistant" %}
                                Assistant
                            {% endif %}
                        </div>
                        <div>{{ msg.content }}</div>
                    </div>
                {% endfor %}
            {% else %}
                <p>No messages yet.</p>
            {% endif %}
        </div>

        <form method="POST" class="form-area">
            <input type="text" name="user_input" placeholder="Type your message here..." required>
            <button type="submit">Send</button>
        </form>

        <form method="POST" action="/clear" class="clear-form">
            <button type="submit">Clear Chat</button>
        </form>
    </div>
</body>
</html>
